name: Author Testing Notification

# Workflow'un ne zaman çalışacağını belirliyoruz
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  add-comment:
    # Sadece "status: author testing" etiketi eklendiğinde çalışsın
    if: github.event.label.name == 'status: author testing'
    runs-on: ubuntu-latest
    
    # Yorum atabilmesi için gerekli izinleri veriyoruz
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Add Dynamic Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Olayın Issue mu yoksa PR mı olduğunu tespit et
            const issueOrPr = context.payload.issue || context.payload.pull_request;
            
            // İçeriği oluşturan kişinin (Author) kullanıcı adını al
            const author = issueOrPr.user.login;
            
            // Atılacak mesajı oluştur
            const message = `🚀 **@${author}** is currently testing this now.`;

            // Yorumu Issue veya PR'a gönder
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueOrPr.number,
              body: message
            });
