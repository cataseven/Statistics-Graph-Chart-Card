name: Issue and Release Automation

on:
  release:
    types: [published]

jobs:
  notify-on-test-release:
    if: github.event.release.target_commitish == 'test'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Comment and Add Label on Referenced Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseBody = context.payload.release.body;
            const releaseTag = context.payload.release.tag_name;

            if (!releaseBody) {
              console.log("Release notes are empty. Skipping.");
              return;
            }

            const regex = /#(\d+)/g;
            let match;
            const issueNumbers = new Set();

            while ((match = regex.exec(releaseBody)) !== null) {
              issueNumbers.add(parseInt(match[1], 10));
            }

            if (issueNumbers.size === 0) {
              console.log("No issues referenced in release notes.");
              return;
            }

            const excludedUsers = ['cataseven'];
            const labelToAdd = 'Author is testing now';

            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });

                const participants = new Set();
                participants.add(issue.user.login);

                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  per_page: 100
                });

                for (const comment of comments) {
                  const u = comment.user;
                  if (u && u.type !== 'Bot' && !u.login.endsWith('[bot]')) {
                    participants.add(u.login);
                  }
                }

                const mentions = [...participants]
                  .filter(login => !excludedUsers.includes(login.toLowerCase()))
                  .map(login => `@${login}`)
                  .join(' ');

                const greeting = mentions ? `**${mentions}** ` : '';
                const message = `${greeting}hi, Please test with the test-release ${releaseTag}`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: message
                });

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: [labelToAdd]
                });

                console.log(`Commented and added '${labelToAdd}' label on #${issueNumber}`);
              } catch (error) {
                console.error(`Could not process #${issueNumber}. It might be a deleted issue or false positive: ${error.message}`);
              }
            }

  notify-on-release:
    if: github.event.release.target_commitish == 'main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Comment on Referenced Issues and Remove Label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseBody = context.payload.release.body;
            const releaseTag = context.payload.release.tag_name;

            if (!releaseBody) {
              console.log("Release notes are empty. Skipping.");
              return;
            }

            const regex = /#(\d+)/g;
            let match;
            const issueNumbers = new Set();

            while ((match = regex.exec(releaseBody)) !== null) {
              issueNumbers.add(parseInt(match[1], 10));
            }

            if (issueNumbers.size === 0) {
              console.log("No issues referenced in release notes.");
              return;
            }

            const excludedUsers = ['cataseven'];
            const labelToRemove = 'Author is testing now';

            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });

                const participants = new Set();
                participants.add(issue.user.login);

                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  per_page: 100
                });

                for (const comment of comments) {
                  const u = comment.user;
                  if (u && u.type !== 'Bot' && !u.login.endsWith('[bot]')) {
                    participants.add(u.login);
                  }
                }

                const mentions = [...participants]
                  .filter(login => !excludedUsers.includes(login.toLowerCase()))
                  .map(login => `@${login}`)
                  .join(' ');

                const greeting = mentions ? `**${mentions}** ` : '';
                const message = `${greeting}hi, please try with the update ${releaseTag}`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: message
                });

                const hasLabel = issue.labels.some(label => label.name === labelToRemove);

                if (hasLabel) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: labelToRemove
                  });
                  console.log(`Removed '${labelToRemove}' label from #${issueNumber}`);
                }

                console.log(`Successfully commented on #${issueNumber}`);
              } catch (error) {
                console.error(`Could not process #${issueNumber}. It might be a deleted issue or false positive: ${error.message}`);
              }
            }
