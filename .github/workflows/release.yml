name: Upload Release Asset
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: statistics-graph-chart-card.js
          fail_on_unmatched_files: true
